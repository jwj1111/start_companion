# ============================================================
# START Companion 全局配置文件
# 复制为 config.yaml 并根据需要修改
#
# 职责划分：
#   本文件 (config.yaml) → 基础设施配置（模型池、存储连接、服务地址）
#   presets/agents/xxx/config.yaml → Agent 行为配置（记忆策略、tool开关、SP模式）
#   .env → 敏感凭据（API Key、密码），不提交 Git
#
# 密钥在这里不写！通过 api_key_env / base_url_env 引用 .env 中的变量名。
# ============================================================

# === 应用 ===
app:
  environment: development
  debug: true
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:5173"
    - "http://localhost:3000"

# === 模型池 ===
# 声明项目中所有可用的模型实例。
# provider 只有四种：openai / anthropic / ollama / huggingface
#   - openai: 覆盖所有 OpenAI 兼容 API（含混元、DeepSeek、智谱等）
#   - anthropic: Claude 系列
#   - ollama: 本地 Ollama 模型
#   - huggingface: 本地 HuggingFace 模型（仅 embedding）
#
# 新增模型只需在这里加一段，不用改代码。
model_pool:
  gpt4o:
    provider: openai
    model: gpt-4o
    api_key_env: GPT4O_API_KEY
    base_url_env: GPT4O_BASE_URL
    temperature: 0.8
    max_tokens: 4096

  gpt4o_mini:
    provider: openai
    model: gpt-4o-mini
    api_key_env: GPT4O_MINI_API_KEY
    base_url_env: GPT4O_MINI_BASE_URL

  openai_embed:
    provider: openai
    model: text-embedding-3-small
    api_key_env: OPENAI_EMBED_API_KEY
    base_url_env: OPENAI_EMBED_BASE_URL

  # --- 示例：接腾讯混元 ---
  # hunyuan_instruct:
  #   provider: openai
  #   model: hunyuan-2.0-instruct-20251111
  #   api_key_env: HUNYUAN_API_KEY
  #   base_url_env: HUNYUAN_BASE_URL

  # --- 示例：接 DeepSeek ---
  # deepseek_chat:
  #   provider: openai
  #   model: deepseek-chat
  #   api_key_env: DEEPSEEK_API_KEY
  #   base_url_env: DEEPSEEK_BASE_URL

  # --- 示例：Claude ---
  # claude_sonnet:
  #   provider: anthropic
  #   model: claude-sonnet-4-20250514
  #   api_key_env: ANTHROPIC_API_KEY

  # --- 示例：本地 Ollama ---
  # local_qwen:
  #   provider: ollama
  #   model: qwen2.5:32b
  #   base_url_env: OLLAMA_URL

  # --- 示例：本地 BGE embedding ---
  # bge_zh:
  #   provider: huggingface
  #   model: BAAI/bge-large-zh-v1.5
  #   device: cuda

# === 角色映射 ===
# 声明每种用途使用模型池中的哪个实例。
# Agent 级别不再重复定义角色映射，统一在此管理。
model_roles:
  main: gpt4o                    # 主对话
  vision: gpt4o                  # 截图分析
  auxiliary: gpt4o_mini          # 辅助任务（摘要、情感分析、记忆提取、query改写、游戏信息总结）
  embedding: openai_embed        # 向量嵌入

# === 存储连接 ===
storage:
  vector_store:
    type: qdrant                          # qdrant / chroma / milvus
    # url 和 api_key 放 .env
    user_memory_collection: "user_memories"
    knowledge_collection: "game_knowledge"

  relational:
    type: sqlite                          # sqlite / mysql
    sqlite_path: "data/companion.db"
    # MySQL 连接信息放 .env

# === 语音服务 ===
voice:
  asr:
    provider: whisper_api                 # whisper_api / whisper_local / custom_api
    model: whisper-1
    language: zh
  tts:
    provider: edge_tts                    # edge_tts / openai_tts / custom_api
    voice_id: "zh-CN-XiaoxiaoNeural"
    speed: 1.0

# === 外部服务 ===
services:
  web_search:
    provider: tavily
    # api_key 放 .env
  screenshot:
    enabled: true
    interval_seconds: 5
    on_demand: true

# === 游戏知识库 ===
knowledge:
  collection_name: "game_knowledge"
  data_dir: "knowledge/data"
  chunk_size: 512
  chunk_overlap: 50
