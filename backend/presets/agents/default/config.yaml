# Agent Behavior Configuration
# 本文件定义单个 Agent 的行为策略。
# 模型选型在全局 config.yaml 的 model_pool / model_roles 中管理，此处不重复。

# === System Prompt 组装模式 ===
# "unified": 所有上下文拼成一个 SystemMessage（兼容性最好）
# "split":   STATIC 组和 DYNAMIC 组分成两个 SystemMessage（固定部分可利用 prompt caching）
sp_mode: unified

# === Context Providers 配置 ===
context_providers:
  disabled: []
    # - memory     # 禁用长期记忆召回
    # - profile    # 禁用用户档案

# === 短期记忆 ===
short_term:
  keep_recent_turns: 15          # 上下文始终保留最近 15 轮原文
  compress_batch: 15             # 每积累 15 轮新内容，压缩为滚动摘要
  # 触发阈值 = keep_recent_turns + compress_batch = 30

# === 长期记忆 ===
memory:
  # Gate 策略：默认不搜，含引用词才触发
  retrieval_count: 5             # 每次检索返回的最大卡片数
  score_threshold: 0.45          # 最低余弦相似度阈值
  auto_approve: false            # 新提取的卡片是否自动审核通过
  # 去重合并
  dedup_merge_threshold: 0.85    # >= 此值 → 替换旧卡
  dedup_add_threshold: 0.60      # < 此值 → 新增卡片
  # 中间地带 → 跳过

# === Tool 使用策略 ===
tools:
  enabled:
    - screenshot
    - game_info
  screenshot:
    auto_trigger_on_silence: true
    silence_threshold_seconds: 60
  game_info:
    prefer_knowledge_base: true
    summary_max_length: 200

# === 对话策略 ===
conversation:
  enable_auto_screenshot: true
  screenshot_interval: 30

# === 响应格式 ===
response:
  max_length: 500
  include_emotion_tag: true
  include_live2d_action: true
