# Docker Compose for START Companion development environment

services:
  # === Vector Database ===
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  # === Backend ===
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    env_file:
      - ../backend/.env
    depends_on:
      - qdrant
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # === Frontend (development) ===
  # frontend:
  #   build:
  #     context: ../frontend
  #   ports:
  #     - "5173:5173"
  #   volumes:
  #     - ../frontend:/app
  #     - /app/node_modules
  #   command: pnpm dev --host

volumes:
  qdrant_data:
